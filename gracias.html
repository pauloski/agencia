<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Mensaje Recibido! | VerticeLab</title>
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">

<link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">

<link rel="shortcut icon" href="images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #171717;
            --text-muted: #52525b;
            --text-on-accent: #ffffff;
            --accent-color: #0B95E0;
            --font-heading: 'Syne', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        [data-theme="dark"] {
            --bg-color: #050505;
            --text-color: #f4f4f5;
            --text-muted: #a1a1aa;
            --text-on-accent: #000000;   
            --accent-color: #22C4FF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-body);
            height: 100vh;
            overflow: hidden; /* Evita scroll por el video */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ================= VIDEO BACKGROUND ================= */
        .video-bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Opacidad baja para que no distraiga del texto */
            opacity: 0.4; 
            transition: opacity 1s ease;
        }

        [data-theme="dark"] #bg-video {
            opacity: 0.25; /* Un poco más sutil en modo oscuro */
        }

        /* ================= CONTENT ================= */
        .container { 
            text-align: center; 
            padding: 0 5%;
            z-index: 10; /* Asegura que esté sobre el video */
        }
        
        .logo-img { max-height: 2.5rem; margin-bottom: 2rem; }
        
        h1 {
            font-family: var(--font-heading);
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin-bottom: 1rem;
            letter-spacing: -2px;
        }

        p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 500px;
            margin: 0 auto 3rem auto;
        }

        .btn-primary {
            display: inline-block;
            background: var(--accent-color);
            color: var(--text-on-accent);
            padding: 1rem 2.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-family: var(--font-heading);
            transition: 0.3s ease;
        }

        .btn-primary:hover { transform: scale(1.05); }
        .gsap-reveal { opacity: 0; transform: translateY(20px); }
    </style>
</head>
<body>

    <div class="video-bg-container">
        <video autoplay muted loop playsinline id="bg-video">
            <source id="video-source" src="" type="video/mp4">
        </video>
    </div>

    <main class="container">
        <img id="thanks-logo" src="images/logo-light.svg" alt="Logo" class="logo-img gsap-reveal">
        <h1 class="gsap-reveal">¡Mensaje <span style="color: var(--accent-color);">enviado!</span></h1>
        <p class="gsap-reveal">Gracias por confiar en VérticeLab. Hemos recibido tu información y nos pondremos en contacto contigo muy pronto.</p>
        <div class="gsap-reveal">
            <a href="index.html" class="btn-primary">Volver al inicio</a>
        </div>
    </main>

    <script>
        const htmlElement = document.documentElement;
        const logo = document.getElementById('thanks-logo');
        const video = document.getElementById('bg-video');
        const videoSource = document.getElementById('video-source');

        // 1. Detectar el tema guardado en el index
        const savedTheme = localStorage.getItem('vertice-theme') || 'light';
        htmlElement.setAttribute('data-theme', savedTheme);
        
        // 2. Configurar Logo y Video según el tema
        if (savedTheme === 'dark') {
            logo.src = 'images/logo-dark.svg';
            videoSource.src = 'images/Video_Gen_Oscuro.mp4';
        } else {
            logo.src = 'images/logo-light.svg';
            videoSource.src = 'images/Video_Gen_Claro.mp4';
        }

        // Cargar el video después de cambiar el src
        video.load();

        // 3. Animación GSAP
        gsap.to(".gsap-reveal", {
            opacity: 1,
            y: 0,
            duration: 0.8,
            stagger: 0.15,
            ease: "power2.out"
        });
    </script>
</body>
</html>
